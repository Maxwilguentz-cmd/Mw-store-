<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser ma commande - Checkout-disney-premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="header-checkout">
        <div class="logo-checkout">Mw<span>Store</span></div>
        <div class="menu-icons">
            <i class="fa-regular fa-bell"></i>
            <div class="barres-menu">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="container-checkout">
        <h1 class="titre-checkout">Finaliser ma commande</h1>

        <div class="etap-bar">
            <div class="etap aktif">
                <span class="etap-chif">&#10003;</span>
                <span class="etap-tiks">Informations</span>
            </div>
            <div class="etap">
                <span class="etap-chif">2</span>
                <span class="etap-tiks">Paiement</span>
            </div>
            <div class="etap">
                <span class="etap-chif">3</span>
                <span class="etap-tiks">Récapitulatif</span>
            </div>
        </div>

        <div class="bwat-livrezon">
            <h2 class="tit-seksyon">Informations de livraison</h2>

            <div class="boite-input-group">
                <span class="ti-tit-atansyon">INFOS — PROFIL PRIVÉ</span>

                <div class="champ-saisie">
                    <label for="whatsapp">Numéro WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="Ex: 38019657 (sans +509)">
                </div>

                <div class="champ-saisie">
                    <label for="Disney-profil">Nom du profil Disney</label>
                    <input type="text" id="Disney-profil" placeholder="Ex: Maxime wilguentz">
                </div>

                <div class="champ-saisie">
                    <label for="pin-code">PIN (4 chiffres)</label>
                    <input type="password" id="pin-code" maxlength="4" placeholder="Ex: 1234">
                </div>
            </div>

            <button type="button" class="btn-continuer" id="btn-continuer">
                Continuer <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div> <div class="kabwa-flottant">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge-kabwa">1</span>
    </div>

    <script>
      document.getElementById('btn-continuer').addEventListener('click', function() {
          let nimewo = document.getElementById('whatsapp').value.trim();
          let profil = document.getElementById('Disney-profil').value.trim();
          let pin = document.getElementById('pin-code').value.trim();
          
          // Validasyon: Tcheke si kliyan an ranpli tout jaden yo nèt
          if (nimewo === "" || profil === "" || pin === "") {
              alert("Silvouplè, ranpli tout jaden yo anvan ou kontinye.");
              return;
          }

          // Validasyon PIN: Tcheke si pin nan gen 4 chif egzakteman
          if (pin.length < 4) {
              alert("PIN nan dwe gen 4 chif.");
              return;
          }

          // AJOUTE: Sere TOUT done yo pou paj 3 (Récapitulatif) la ka afiche yo bay kliyan an anvan li peye
          localStorage.setItem('whatsapp_kliyan', nimewo);
          localStorage.setItem('profil_Disney', profil);
          localStorage.setItem('pin_disney', pin);
          
          // Ale dirèk nan paj peman an
          window.location.href = "paiement-disney.html";
      });
    </script>    

</body>
</html>
