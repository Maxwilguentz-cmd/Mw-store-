<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Caox Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <header class="admin-header">
        <div class="logo">
            <span class="logo-caox">Caox</span><span class="logo-store"> Admin</span>
        </div>
        <div class="admin-profile">
            <span>Maxime</span>
            <div class="avatar"><i class="fa-solid fa-user-gear"></i></div>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-title-section">
            <h1>Gestion des Commandes</h1>
            <p>Apwouve oswa refize kòmand kliyan yo epi voye aksè yo.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">En cours</span>
                <span class="stat-number num-waiting" id="count-encour">0</span>
            </div>
        </div>

        <div class="admin-orders-list">
            <p style="text-align: center; color: #64748b;">Chajman kòmand yo...</p>
        </div>
    </main>

    <div class="modal-overlay" id="approveModal">
        <div class="modal-box">
            <h2><i class="fa-solid fa-key" style="color: #cca43b;"></i> Livrer les accès</h2>
            <p id="modal-service-name" style="color: #888; margin-top: -5px;"></p>
            
            <form id="approveForm">
                <input type="hidden" id="approve-order-id">
                <div class="form-group">
                    <label>Email du compte</label>
                    <input type="email" id="acc-email" placeholder="Ex: netflix@caox.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="text" id="acc-password" placeholder="Ex: TopPass123" required>
                </div>
                <div class="form-group">
                    <label>Profil attribué</label>
                    <input type="text" id="acc-profile" placeholder="Ex: Profil 3 (Jean)" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-modal-cancel" id="btn-cancel-approve">Annuler</button>
                    <button type="submit" class="btn-modal-confirm">Confirmer & Livrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="rejectModal">
        <div class="modal-box">
            <h2><i class="fa-solid fa-triangle-exclamation" style="color: #ff4d4d;"></i> Refuser la commande</h2>
            <form id="rejectForm">
                <input type="hidden" id="reject-order-id">
                <div class="form-group">
                    <label>Raison du refus</label>
                    <textarea id="reject-reason" placeholder="Ex: Code de transaction incorrect." rows="3" required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-modal-cancel" id="btn-cancel-reject">Annuler</button>
                    <button type="submit" class="btn-modal-confirm btn-red">Confirmer le refus</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ RANPLASE AK VRÈ ENFÒMASYON FIREBASE PA W LA
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const adminListContainer = document.querySelector('.admin-orders-list');
        const countWaiting = document.getElementById('count-encour');

        // Koute sèlman kòmand ki "encour" yo
        const qAdmin = query(collection(db, "commandes"), where("status", "==", "encour"));

        onSnapshot(qAdmin, (querySnapshot) => {
            adminListContainer.innerHTML = "";
            countWaiting.innerText = querySnapshot.size;

            if (querySnapshot.empty) {
                adminListContainer.innerHTML = `<p style="text-align: center; color: #64748b; padding: 20px;">Pa gen okenn kòmand an atant kounye a. 🎉</p>`;
                return;
            }

            querySnapshot.forEach((documentSnap) => {
                const komand = documentSnap.data();
                const idKomand = documentSnap.id;

                const card = document.createElement('div');
                card.className = 'admin-order-card urgent';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="service-tag tag-netflix">${komand.service || 'Sèvis'}</span>
                        <span class="admin-status status-pending">⏳ En attente</span>
                    </div>
                    <div class="client-details">
                        <p><strong>Code:</strong> ${idKomand}</p>
                        <p><strong>Client:</strong> ${komand.client || 'Enkonni'}</p>
                        <p><strong>WhatsApp:</strong> <a href="https://wa.me/509${komand.whatsapp}" target="_blank" class="client-phone"><i class="fa-brands fa-whatsapp"></i> ${komand.whatsapp || ''}</a></p>
                        <p><strong>Paiement:</strong> ${komand.paiement || ''} (${komand.montant || 0} HTG)</p>
                    </div>
                    <div class="admin-actions">
                        <button class="btn-action btn-approve" data-id="${idKomand}" data-service="${komand.service || 'Sèvis'}">
                            <i class="fa-solid fa-check"></i> Valider
                        </button>
                        <button class="btn-action btn-reject" data-id="${idKomand}">
                            <i class="fa-solid fa-xmark"></i> Refuser
                        </button>
                    </div>
                `;

                // Evènman klike sou bouton Valider
                card.querySelector('.btn-approve').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    document.getElementById('approve-order-id').value = btn.getAttribute('data-id');
                    document.getElementById('modal-service-name').innerText = "Commande: " + btn.getAttribute('data-id') + " (" + btn.getAttribute('data-service') + ")";
                    document.getElementById('approveModal').classList.add('show');
                });

                // Evènman klike sou bouton Refuser
                card.querySelector('.btn-reject').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    document.getElementById('reject-order-id').value = btn.getAttribute('data-id');
                    document.getElementById('rejectModal').classList.add('show');
                });

                adminListContainer.appendChild(card);
            });
        });

        // Fèmen Modal yo
        document.getElementById('btn-cancel-approve').addEventListener('click', () => document.getElementById('approveModal').classList.remove('show'));
        document.getElementById('btn-cancel-reject').addEventListener('click', () => document.getElementById('rejectModal').classList.remove('show'));

        // Soumèt Apwobasyon
        document.getElementById('approveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('approve-order-id').value;
            const email = document.getElementById('acc-email').value;
            const password = document.getElementById('acc-password').value;
            const profil = document.getElementById('acc-profile').value;

            try {
                await updateDoc(doc(db, "commandes", id), {
                    status: "valide",
                    email: email,
                    password: password,
                    profil: profil
                });
                document.getElementById('approveModal').classList.remove('show');
                document.getElementById('approveForm').reset();
            } catch (err) {
                alert("Erreur nan validation: " + err.message);
            }
        });

        // Soumèt Refi
        document.getElementById('rejectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('reject-order-id').value;
            const raison = document.getElementById('reject-reason').value;

            try {
                await updateDoc(doc(db, "commandes", id), {
                    status: "refuse",
                    raison: raison
                });
                document.getElementById('rejectModal').classList.remove('show');
                document.getElementById('rejectForm').reset();
            } catch (err) {
                alert("Erreur nan refize: " + err.message);
            }
        });
    </script>
</body>
</html>
