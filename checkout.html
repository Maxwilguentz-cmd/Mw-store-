<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // PASE KONFIGIRASYON PA W LA ISIT LA VRE
  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "mwstore-db.firebaseapp.com",
    projectId: "mwstore-db",
    storageBucket: "mwstore-db.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  // Inisyalize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Lè moun nan klike sou kontinye
  document.getElementById('btn-continuer').addEventListener('click', async function() {
      let nimewo = document.getElementById('whatsapp').value;
      
      if(nimewo === "") {
          alert("Silvouplè antre nimewo WhatsApp ou a");
          return;
      }

      try {
          // N ap sove nimewo a nan yon koleksyon ki rele "commandes"
          await addDoc(collection(db, "commandes"), {
              whatsapp: nimewo,
              date: new Date()
          });
          
          alert("Kòmand ou anrejistre avèk siksè!");
          // Ou ka mete yon kòd isit la pou l mennen l nan paj paiement an pita
      } catch (e) {
          alert("Gen yon erè ki pase: " + e.message);
      }
  });
</script>
