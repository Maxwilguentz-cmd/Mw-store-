<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser ma commande</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-checkout">
        <div class="logo-checkout">Mw<span>Store</span></div>
        <div class="menu-icons">
            <i class="fa-regular fa-bell"></i>
            <div class="barres-menu">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="container-checkout">
        <h1 class="titre-checkout">Finaliser ma commande</h1>

        <div class="etap-bar">
            <div class="etap aktif">
                <span class="etap-chif">&#10003;</span>
                <span class="etap-tiks">Informations</span>
            </div>
            <div class="etap">
                <span class="num-etape">2</span>
                <span class="texte-etape">Paiement</span>
            </div>
            <div class="etap">
                <span class="num-etape">3</span>
                <span class="texte-etape">Récapitulatif</span>
            </div>
        </div>            


        <div class="carte-formulaire">
            <h2>Informations de livraison</h2>
            
            <div class="boite-input-group">
                <span class="badge-input">INFOS — PROFIL PARTAGÉ</span>
                <label for="whatsapp">Numéro WhatsApp</label>
                <input type="number" id="whatsapp" placeholder="Ex: 35730041 (sans +509)" required>
            </div>
            <div class="goup-boutons-anba" style="margin-top: 30px; display: flex; justify-content: space-between; gap: 15px;">
                <button type="button" class="btn-retour" onclick="window.location.href='disney.html'" style="padding: 12px 20px; border: 1px; color: white; border-radius: 15px; cursor: pointer; font-weight: bold;">
                    <i class="fa-solid fa-arrow-left"></i> Boutiques
                </button>            

                <button type="button" class="btn-continuer" id="btn-continuer">
                    Continuer <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="kabwa-flottant">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge-kabwa">1</span>
    </div>

    <script>
      // 1. BLOKAJ SEKIRITE: Nou tcheke si moun nan te konekte anvan nou kite l wè paj la
      let mounNanKonekte = localStorage.getItem("user_connecte");
      let imelMounNan = localStorage.getItem("user_email");
      
      if (mounNanKonekte !== "true" || !imelMounNan) {
          // Si l pa konekte, nou netwaye memwa a epi nou voye l dirèkteman al konekte
          localStorage.clear();
          window.location.href = "connexion.html";
      }

      // 2. KÒD PAJ LA POU SOVE NIMEWO A
      document.getElementById('btn-continuer').addEventListener('click', function() {
          let nimewo = document.getElementById('whatsapp').value.trim();
          
          if (nimewo === "") {
              alert("Silvouplè antre nimewo WhatsApp ou a");
              return;
          }

          localStorage.setItem("user_whatsapp", nimewo);
          
          // Chanje paj pou ale nan peman
          window.location.href = "paiement.html";
      });
    </script>
</body>
</html>
