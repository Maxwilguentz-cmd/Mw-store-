<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istorik Kòmand - MW Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style12.css">
</head>
<body>

    <header class="header-historik">
        <div class="logo">
            <span class="logo-caox">MW</span><span class="logo-store"> Store</span>
        </div>
        <div class="header-right">
            <button class="btn-notif"><i class="fa-regular fa-bell"></i></button>
            <div class="menu-hamburger">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="container-historik">
        <p class="instruction-text">Suivez l'état de vos achats et retrouvez vos codes livrés.</p>

        <div class="tabs-container">
            <button class="tab-btn active" data-filter="toutes">Toutes</button>
            <button class="tab-btn" data-filter="valide">Validées</button>
            <button class="tab-btn" data-filter="encour">En cours</button>
            <button class="tab-btn" data-filter="refuse">Refusées</button>
        </div>

        <div class="refresh-container">
            <button class="btn-refresh" id="refresh-btn"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>

        <div class="orders-list">
            <p style="text-align: center; color: #64748b;">Chajman kòmand yo...</p>
        </div>
