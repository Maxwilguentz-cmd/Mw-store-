<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istorik Kòmand - MW Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style12.css">
</head>
<body>

    <header class="header-historik">
        <div class="logo">
            <span class="logo-caox">MW</span><span class="logo-store"> Store</span>
        </div>
        <div class="header-right">
            <button class="btn-notif"><i class="fa-regular fa-bell"></i></button>
            <div class="menu-hamburger">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="container-historik">
        <p class="instruction-text">Suivez l'état de vos achats et retrouvez vos codes livrés.</p>

        <div class="tabs-container">
            <button class="tab-btn active" data-filter="toutes">Toutes</button>
            <button class="tab-btn" data-filter="valide">Validées</button>
            <button class="tab-btn" data-filter="encour">En cours</button>
            <button class="tab-btn" data-filter="refuse">Refusées</button>
        </div>

        <div class="refresh-container">
            <button class="btn-refresh" id="refresh-btn"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>

        <div class="orders-list">
            <p style="text-align: center; color: #64748b;">Chajman kòmand yo...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLI1saOnC901wS54bR57Pni6qr5C4PrzM",
            authDomain: "mwstore-526d1.firebaseapp.com",
            projectId: "mwstore-526d1",
            storageBucket: "mwstore-526d1.firebasestorage.app",
            messagingSenderId: "901851187874",
            appId: "1:901851187874:web:a5936637da5cfa925325fb",
            measurementId: "G-5H72KDEHD9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userWhatsapp = localStorage.getItem('user_whatsapp') || localStorage.getItem('whatsapp_kliyan') || "35730041";
        userWhatsapp = String(userWhatsapp).trim();

        const ordersListContainer = document.querySelector('.orders-list');
        let aktiyèlFiltre = "toutes";

        try {
            const q = query(collection(db, "commandes"), where("whatsapp", "==", userWhatsapp));

            onSnapshot(q, (querySnapshot) => {
                aficheKomandYo(querySnapshot);
            }, (error) => {
                console.error("Erreur detaye Firebase:", error);
                ordersListContainer.innerHTML = `<p style="text-align: center; color: #ff4d4d;">Erreur Firebase. Enspekte konsòl la.</p>`;
            });
        } catch (err) {
            console.error("Erreur nan kòd la:", err);
        }

        function aficheKomandYo(snapshot) {
            ordersListContainer.innerHTML = "";
            
            if (snapshot.empty) {
                ordersListContainer.innerHTML = `<p style="text-align: center; color: #64748b;">Ou pa gen okenn kòmand pou nimewo (${userWhatsapp}) sa a.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const komand = doc.data();
                const idKomand = doc.id;
                const estati = komand.status || "encour";

                const card = document.createElement('div');
                card.className = 'order-card';
                card.setAttribute('data-status', estati);

                // KOREKSYON FILTRAJ: Afiche si se "toutes" oubyen si estati a koresponn ak filtè a
                if (aktiyèlFiltre === "toutes" || estati === aktiyèlFiltre) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }

                let badjEstati = "";
                let bwatInfoVert = "";
                let bwatDetay = "";

                if (estati === "encour") {
                    badjEstati = `<div class="status-badge status-validation">⏳ Validation...</div>`;
                    bwatInfoVert = `
                        <div class="info-box-green">
                            <div class="info-title"><i class="fa-solid fa-mailbox"></i> Commande en cours de traitement</div>
                            <p class="info-desc">Notre équipe prépare votre commande. Contactez-nous pour finaliser la livraison.</p>
                            <a href="https://wa.me/50938019657?text=Bonjou%20Mw%20Store,%20mwen%20gen%20yon%20pwoblèm%20ak%20kòmand%20${idKomand}" target="_blank" class="btn-whatsapp">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp
                            </a>
                        </div>`;
                    bwatDetay = `<p>Kòmand ou ap disponib touswit apre verifikasyon admin lan.</p>`;
                } else if (estati === "valide") {
                    badjEstati = `<div class="status-badge status-valide">✅ Validée</div>`;
                    bwatDetay = `
                        <div class="data-delivered">
                            <h3>🔑 Enfòmasyon Kont Ou:</h3>
                            <div class="account-field"><span><strong>Email:</strong> ${komand.email || ''}</span></div>
                            <div class="account-field"><span><strong>Modpas:</strong> ${komand.password || ''}</span></div>
                            <div class="account-field"><span><strong>Profil:</strong> ${komand.profil || 'Profil Paj'}</span></div>
                        </div>`;
                } else if (estati === "refuse" || estati === "refusée") {
                    // KOREKSYON: Sipòte fòma "refuse" san aksan ak tout klas CSS la
                    badjEstati = `<div class="status-badge status-refuse" style="background: #ef4444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem;">❌ Refusée</div>`;
                    bwatDetay = `
                        <div class="data-rejected" style="padding: 10px; background: #2d1e1e; border-left: 4px solid #ef4444; border-radius: 4px; margin-top: 10px;">
                            <p style="color: #ff9999; margin: 0;"><strong>Rezon Refize:</strong> ${komand.raison || 'Tranzaksyon pa lwen oswa anile.'}</p>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="order-header">
                        <div class="service-info">
                            <h2>${komand.service || 'Sèvis'}</h2>
                            <span class="order-id-date">${idKomand} | ${komand.date || ''}</span>
                        </div>
                        ${badjEstati}
                    </div>
                    <div class="order-meta">
                        <div class="meta-item"><span class="meta-label">Montant</span><span class="meta-value">${komand.montant || '0'} HTG</span></div>
                        <div class="meta-item"><span class="meta-label">Paiement</span><span class="meta-value">${komand.paiement || 'Panyen'}</span></div>
                    </div>
                    ${bwatInfoVert}
                    <button class="btn-details-toggle">
                        <i class="fa-regular fa-eye"></i> Voir les détails
                    </button>
                    <div class="order-details-dropdown">
                        <div class="details-content">${bwatDetay}</div>
                    </div>
                `;

                const toggleBtn = card.querySelector('.btn-details-toggle');
                const dropdown = card.querySelector('.order-details-dropdown');
                toggleBtn.addEventListener('click', () => {
                    dropdown.classList.toggle('open');
                    toggleBtn.innerHTML = dropdown.classList.contains('open') ? 
                        '<i class="fa-regular fa-eye-slash"></i> Masquer les détails' : '<i class="fa-regular fa-eye"></i> Voir les détails';
                });

                ordersListContainer.appendChild(card);
            });
        }

        // Kat tab filtraj yo
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                aktiyèlFiltre = tab.getAttribute('data-filter');
                const cards = document.querySelectorAll('.order-card');

                cards.forEach(card => {
                    const status = card.getAttribute('data-status');
                    if (aktiyèlFiltre === 'toutes' || status === aktiyèlFiltre) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        document.getElementById('refresh-btn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
