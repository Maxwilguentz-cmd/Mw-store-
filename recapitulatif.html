<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récapitulatif de la commande</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Ba Navigasyon anlè a -->
    <div class="header-checkout">
        <div class="logo-checkout">Mw<span>Store</span></div>
        <div class="menu-icons">
            <i class="fa-regular fa-bell"></i>
            <div class="barres-menu">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- Kontni Prensipal la -->
    <div class="container-checkout">
        <h1 class="titre-checkout" style="text-align: center; font-size: 2rem; margin-bottom: 20px;">commande</h1>

        <!-- Liy Etap yo -->
        <div class="etapes-barre">
            <div class="etape">
                <span class="num-etape"><i class="fa-solid fa-check"></i></span>
                <span class="texte-etape">Informations</span>
            </div>
            <div class="etape">
                <span class="num-etape"><i class="fa-solid fa-check"></i></span>
                <span class="texte-etape">Paiement</span>
            </div>
            <div class="etape active">
                <span class="num-etape"><i class="fa-solid fa-check"></i></span>
                <span class="texte-etape">Récapitulatif</span>
            </div>
        </div>

        <!-- Kat Rezime a -->
        <div class="carte-formulaire">
            <h2 style="font-size: 1.4rem; font-weight: normal; margin-bottom: 25px;">Récapitulatif de la commande</h2>
            
            <!-- Pati Dinamik: Sèvis ak Pri -->
            <div class="liy-recap-pwodwi">
                <span id="recap-non-s悪is" style="color: white; font-size: 1.1rem;">Netflix Partagé <span style="color: #555; font-size: 0.9rem;">x1</span></span>
                <span id="recap-pri-anwo" class="montant-dinamik" style="color: white; font-weight: bold; font-size: 1.1rem;">500 G</span>
            </div>

            <!-- Bwat Infos Streaming lan -->
            <div class="bwat-infos-streaming">
                <span class="ti-tit-bwat">INFOS STREAMING</span>
                <div class="liy-detay-whatsapp">
                    <span style="color: #555;">WhatsApp</span>
                    <span id="recap-whatsapp" style="color: #888;">Chargement...</span>
                </div>
            </div>

            <!-- Sous-total ak Total -->
            <div class="liy-recap-pri" style="margin-top: 30px; border-bottom: 1px solid #111; padding-bottom: 15px;">
                <span style="color: #555;">Sous-total</span>
                <span id="recap-sous-total" style="color: #555;">500 G</span>
            </div>

            <div class="liy-recap-pri" style="margin-top: 15px; margin-bottom: 20px;">
                <span style="color: white; font-size: 1.3rem; font-weight: bold;">Total à payer</span>
                <span id="recap-total-final" style="color: white; font-size: 1.3rem; font-weight: bold;">500 G</span>
            </div>

            <!-- Ti kaz pou koche a -->
            <div class="boite-checkbox-rules">
                <input type="checkbox" id="accept-rules" onchange="tchekeCheckbox()">
                <label for="accept-rules">J'accepte les <a href="#" style="color: #d1b052; text-decoration: none;">règles anti-fraude</a> de MwStore.</label>
            </div>

            <!-- Bouton navigasyon yo kòt a kòt -->
            <div class="goup-boutons-anba">
                <button type="button" class="btn-retour" onclick="window.location.href='paiement.html'">
                    <i class="fa-solid fa-arrow-left"></i> Retour
                </button>
                <button type="button" class="btn-valider-commande" id="btn-finaliser" disabled>
                    Valider ma commande
                </button>
            </div>
        </div>
    </div>

    <!-- Ti bouton kabwa -->
    <div class="kabwa-flottant">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge-kabwa">1</span>
    </div>

    <!-- Enpòtasyon SDK Firebase nan dènye paj la pou l ka voye tout done yo ansanm -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Konfigirasyon Firebase pa w la nèt
        const firebaseConfig = {
            apiKey: "AIzaSyCLI1saOnC901wS54bR57Pni6qr5C4PrzM",
            authDomain: "mwstore-526d1.firebaseapp.com",
            projectId: "mwstore-526d1",
            storageBucket: "mwstore-526d1.firebasestorage.app",
            messagingSenderId: "901851187874",
            appId: "1:901851187874:web:a5936637da5cfa925325fb",
            measurementId: "G-5H72KDEHD9"
        };

        // Inisyalize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener("DOMContentLoaded", function() {
            // Ranmase done yo nan memwa a
            let nonSèvis = localStorage.getItem('s悪is_chwazi') || "Netflix Partagé x1";
            let priSèvis = localStorage.getItem('pri_chwazi') || "500 G";
            let whatsappKliyan = localStorage.getItem('whatsapp_kliyan') || "Non spécifié";

            // Mete yo nan HTML la otomatikman
            document.getElementById('recap-non-s悪is').innerHTML = nonSèvis;
            document.getElementById('recap-pri-anwo').innerText = priSèvis;
            document.getElementById('recap-sous-total').innerText = priSèvis;
            document.getElementById('recap-total-final').innerText = priSèvis;
            document.getElementById('recap-whatsapp').innerText = whatsappKliyan;
        });

        function tchekeCheckbox() {
            const checkbox = document.getElementById('accept-rules');
            const btnFinaliser = document.getElementById('btn-finaliser');
            
            if (checkbox.checked) {
                btnFinaliser.disabled = false;
                btnFinaliser.style.opacity = "1";
            } else {
                btnFinaliser.disabled = true;
                btnFinaliser.style.opacity = "0.4";
            }
        }

        // SE LÈ SÈVITÈ A KLIKE SOU BOUTON SA A POU TOUT DONE YO ALE NAN FIREBASE
        document.getElementById('btn-finaliser').addEventListener('click', function() {
            let whatsappKliyan = localStorage.getItem('whatsapp_kliyan') || "00000000";
            let metodPeman = localStorage.getItem('metod_peman') || "Non spécifié";
            let txnId = localStorage.getItem('txn_id_kliyan') || "Aucun ID";
            let nonSèvis = localStorage.getItem('s悪is_chwazi') || "Netflix Partagé x1";
            let priSèvis = localStorage.getItem('pri_chwazi') || "500 G";

            // Nou voye tout blòk la ansanm nan koleksyon "commandes_valides"
            db.collection("commandes_valides").add({
                whatsapp: whatsappKliyan,
                service: nonSèvis,
                montant: priSèvis,
                methode_peman: metodPeman,
                transaction_id: txnId,
                date: new Date()
            })
            .then(function() {
                alert("Félicitations! Votre commande a été enregistrée avec succès.");
                localStorage.clear(); // Netwaye memwa a apre tou bagay fin regle
                window.location.href = "index.html"; 
            })
            .catch(function(error) {
                alert("Erreur Firebase: " + error.message);
            });
        });
    </script>
</body>
</html>
